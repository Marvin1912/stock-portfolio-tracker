<div id="add-holding-form" class="add-form-container">
  <h2>Add Holding</h2>
  <form
    hx-post="/htmx/holdings"
    hx-target="#holdings-tbody"
    hx-swap="beforeend"
    hx-on::after-request="if(event.detail.successful && event.detail.elt === this) this.closest('#add-holding-form').remove()">
    {% if error %}
    <div class="form-error">{{ error }}</div>
    {% endif %}
    <div class="form-row">
      <label for="ticker">Ticker</label>
      <div class="input-group">
        <input
          type="text"
          id="ticker"
          name="ticker"
          value="{{ ticker or '' }}"
          placeholder="e.g. AAPL"
          autocomplete="off"
          class="input-mono input-glow"
          oninput="toggleWknTicker(this, 'wkn', 'ticker-hint', 'wkn-hint')"
          hx-get="/htmx/validate-ticker"
          hx-trigger="input changed delay:600ms"
          hx-include="[name='ticker']"
          hx-target="#ticker-hint"
          hx-swap="innerHTML">
        <span id="ticker-hint"></span>
      </div>
    </div>
    <div class="form-or-divider">
      <span class="or-label">OR</span>
    </div>
    <div class="form-row">
      <label for="wkn">WKN</label>
      <div class="input-group">
        <input
          type="text"
          id="wkn"
          name="wkn"
          value="{{ wkn or '' }}"
          placeholder="e.g. 840400"
          autocomplete="off"
          class="input-mono input-glow"
          oninput="toggleWknTicker(this, 'ticker', 'wkn-hint', 'ticker-hint')"
          hx-get="/htmx/validate-wkn"
          hx-trigger="input changed delay:600ms"
          hx-include="[name='wkn']"
          hx-target="#wkn-hint"
          hx-swap="innerHTML">
        <span id="wkn-hint"></span>
      </div>
    </div>
    <div class="form-row">
      <label for="quantity">Quantity</label>
      <input
        type="number"
        id="quantity"
        name="quantity"
        value="{{ quantity or '' }}"
        min="0.00000001"
        step="any"
        placeholder="e.g. 10"
        required
        class="input-mono input-glow">
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary">Add</button>
      <button
        type="button"
        onclick="document.getElementById('add-holding-form').remove()"
        class="btn-ghost">Cancel</button>
    </div>
  </form>
</div>
<script>
  function toggleWknTicker(activeInput, otherId, activeHintId, otherHintId) {
    var other = document.getElementById(otherId);
    if (activeInput.value) {
      other.disabled = true;
    } else {
      other.disabled = false;
      document.getElementById(otherHintId).innerHTML = '';
    }
  }
</script>
